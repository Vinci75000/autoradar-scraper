# Généré le 2026-05-08, ajusté après vérif insolvabilités + prospection plateformes.
# Drop-in pour autoradar-scraper/sources/.
#
# ─── Conventions ───────────────────────────────────────────────────────────────
#   tier:           1 = institutional/concours, 2 = premium volume, 3 = entry
#   score_bonus:    tier1=+5, tier2=+3, tier3=+1
#   type:           marketplace | dealer | hub | directory | partnership
#   status:         ready | manual_inspect | deferred | recon_only
#   scrape_method:  jsonld | html_paginated | sitemap | platform_symfio
#                   | platform_rivamedia | recon_only | tbd
#   platform:       (optionnel) symfio | rivamedia → active parser commun
#
# ─── Récap ─────────────────────────────────────────────────────────────────────
#   2 marketplaces (Classic-Trader, Elferspot) — priorité absolue, ROI massif
#   6 dealers tier 1 + 4 dealers tier 1 ajoutés session (dont 1 Symfio, 1 Hollmann)
#   6 dealers tier 2 + 4 dealers tier 2 ajoutés session (3 Symfio + Pyritz)
#   5 hubs en recon_only (Classic Remise DD/B, Klassikstadt, Motorworld, Ofenwerk)
#   1 directory (Car and Classic DE)
#   1 partnership (MB Heritage, successeur Kienle)
#   Stock estimé cumulé scrappable : ~1 800 à 3 500 voitures premium DE (hors
#   marketplaces, qui peuvent dépasser à eux seuls 15 000 fiches).

