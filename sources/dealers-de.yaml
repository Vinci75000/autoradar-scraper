# ════════════════════════════════════════════════════════════════════════════
# RETIRÉS suite à vérification (do not seed)
# ════════════════════════════════════════════════════════════════════════════
#
# ❌ kienle (Heimerdingen)
#    Insolvabilité oct 2023 + scandale fraude 300SL (~130 véhicules avec
#    numéros châssis manipulés selon enquêteurs LKA). Mercedes-Benz Heritage
#    GmbH a racheté pièces/savoir-faire/employés au 01/02/2024 pour 3,05 M€.
#    Klaus Kienle décédé en 2025. La GmbH n'existe plus en tant que telle.
#    → Voir mb-heritage-classic-center pour la piste partenariat constructeur.
#
# ❌ auto-salon-singen (Singen, Bodensee)
#    Insolvabilité ouverte 28/07/2025 par Tribunal Constance suite à
#    escroquerie Ferrari sur acomptes (le dirigeant Michael Koltes avait
#    fait des avances pour des Ferrari livrées par un faux intermédiaire
#    qui s'est volatilisé). Fermeture prévue oct 2025. 200 cars showroom +
#    400 en offre à l'arrêt — site probablement plus alimenté.
