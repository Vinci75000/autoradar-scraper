name: AutoRadar Sotheby's Motorsport Pipeline (cron 12h UTC)

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max URLs to process (empty = full run)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (no DB write)'
        required: false
        default: 'false'

concurrency:
  group: sothebysmotor-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_SCRAPER }}
      SENTRY_COMPONENT: sothebysmotor
      AUTORADAR_LLM_HOOK_ENABLED: 'true'
      LIMIT: ${{ github.event.inputs.limit }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run sothebysmotor pipeline
        run: python -u scripts/run_sothebysmotor.py --limit 800
