name: auction_live_refresh

on:
  schedule:
    # Every 4 hours — refreshes bid_current/watchers for auctions
    # closing in <48h (priority). ~100 fetches × 1s = ~250s per run.
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -u scripts/auction_live_refresh.py --limit 100
