name: auction_archive

on:
  schedule:
    # Daily 02h UTC — moves ended/sold auctions >30 days from cars to cars_archive.
    # DB-only, cheap, idempotent. Keeps `cars` table tight as inventory grows.
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -u scripts/auction_archive.py --retention-days 30
