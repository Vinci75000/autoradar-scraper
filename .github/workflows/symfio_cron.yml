name: AutoRadar Symfio Pipeline (cron 03h UTC)

# Symfio multi-tenant pipeline canary.
# Couvre 3 dealers DE: auto-seredin, jungblut-sportwagen, autostrada-sport.
# Schedule modeste (1x/jour 03h UTC) pour les 1-2 premieres semaines de
# canary. Apres validation, on consolidera dans dealers_cron.

on:
  schedule:
    # 03:00 UTC = 04:00 Paris hiver / 05:00 Paris ete
    # Choix volontairement decale des autres crons (dealers 00h+12h,
    # green 22h, yellow 04h, phase-a 08h) pour eviter overlap.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Cars max par dealer'
        required: false
        default: '10'
      slug:
        description: 'Limiter a un dealer (auto-seredin / jungblut-sportwagen / autostrada-sport / vide=tous)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (extract + adapt, NO insert)'
        type: boolean
        required: false
        default: false

concurrency:
  group: symfio-pipeline
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Symfio pipeline (canary)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # LLM hook actif sur Symfio aussi (coherent avec dealers cron canary).
          # SoT: collector >=25 ans OR px >=60k. Cap budget global protege par
          # le tarif Haiku ~0.18c/call apres L1.
          AUTORADAR_LLM_HOOK_ENABLED: 'true'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENTRY_DSN_SCRAPER: ${{ secrets.SENTRY_DSN_SCRAPER }}
          SENTRY_ENVIRONMENT: 'production'
          SENTRY_COMPONENT: 'cron-symfio'
        run: |
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          SLUG="${{ github.event.inputs.slug }}"
          DRY="${{ github.event.inputs.dry_run }}"
          
          ARGS="--limit $LIMIT"
          if [ -n "$SLUG" ]; then ARGS="$ARGS --slug $SLUG"; fi
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          
          echo "Running: python -u scripts/scrape_symfio_pipeline.py $ARGS"
          python -u scripts/scrape_symfio_pipeline.py $ARGS
