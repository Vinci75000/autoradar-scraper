name: AutoRadar Batch DEALERS (cron 00h+12h UTC)

on:
  schedule:
    # 00:00 UTC = 01:00 Paris hiver / 02:00 Paris été
    # 12:00 UTC = 13:00 Paris hiver / 14:00 Paris été
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: 'Pages par concession'
        required: false
        default: '1'
      threshold:
        description: "Seuil d'alerte en %"
        required: false
        default: '15'

# Évite les runs concurrents
concurrency:
  group: batch-dealers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run batch DEALERS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Phase 6 canary -- LLM hook enabled on dealers cron only.
          # Hook se declenche selon SoT (collector OR px>=60k) sur les
          # nouvelles cars insertees pendant ce cron. Cap budget global
          # protege par le tarif Haiku ~0.18c/call apres L1.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENTRY_DSN_SCRAPER: ${{ secrets.SENTRY_DSN_SCRAPER }}
          SENTRY_ENVIRONMENT: 'production'
          SENTRY_COMPONENT: 'cron-dealers'
          AUTORADAR_LLM_HOOK_ENABLED: "true"
        run: |
          python3 batch_runner.py \
            --batch dealers \
            --quiet \
            --pages ${{ github.event.inputs.pages || '1' }} \
            --threshold ${{ github.event.inputs.threshold || '50' }}
        continue-on-error: true

      - name: Read summary JSON
        id: summary
        if: always()
        run: |
          if [ -f reports/dealers/latest.json ]; then
            ALERT=$(python3 -c "import json; print(json.load(open('reports/dealers/latest.json'))['alert'])")
            OK_PCT=$(python3 -c "import json; print(json.load(open('reports/dealers/latest.json'))['sources_ok_pct'])")
            OK_COUNT=$(python3 -c "import json; print(json.load(open('reports/dealers/latest.json'))['sources_ok'])")
            TOTAL=$(python3 -c "import json; print(json.load(open('reports/dealers/latest.json'))['sources_total'])")
            NEW_CARS=$(python3 -c "import json; print(json.load(open('reports/dealers/latest.json'))['new_in_db'])")

            echo "alert=$ALERT" >> $GITHUB_OUTPUT
            echo "ok_pct=$OK_PCT" >> $GITHUB_OUTPUT
            echo "ok_count=$OK_COUNT" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "new_cars=$NEW_CARS" >> $GITHUB_OUTPUT
          fi

      - name: Analyze and rotate reports
        if: always()
        run: python3 analyzer.py --batch dealers

      - name: Commit report to repo
        if: always()
        run: |
          git config user.name "AutoRadar Bot"
          git config user.email "bot@autoradar.local"
          git add reports/dealers/
          if git diff --cached --quiet; then
            echo "Aucun changement à commiter"
          else
            git commit -m "🏎️ dealers run @ $(date -u +%Y-%m-%d_%H:%M_UTC) — ${{ steps.summary.outputs.ok_count }}/${{ steps.summary.outputs.total }} OK, ${{ steps.summary.outputs.new_cars }} new"
            git pull --rebase origin main || true
            git push
          fi

      - name: Open alert issue if <threshold
        if: steps.summary.outputs.alert == 'True'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportContent = fs.readFileSync('reports/dealers/latest.md', 'utf8');
            const okPct = '${{ steps.summary.outputs.ok_pct }}';
            const okCount = '${{ steps.summary.outputs.ok_count }}';
            const total = '${{ steps.summary.outputs.total }}';
            const newCars = '${{ steps.summary.outputs.new_cars }}';
            const today = new Date().toISOString().slice(0,10);

            const title = `⚠️ Batch DEALERS dégradé — ${okCount}/${total} OK (${okPct}%) — ${today}`;
            const body = `**Alerte automatique :** moins de 50% des concessions sont opérationnelles.\n\n` +
                         `- **OK :** ${okCount}/${total} (${okPct}%)\n` +
                         `- **Nouvelles voitures :** ${newCars}\n` +
                         `- **Run :** ${new Date().toISOString()}\n\n` +
                         `<details><summary>Rapport complet</summary>\n\n${reportContent}\n</details>\n\n` +
                         `_Issue auto-créée par cron DEALERS._`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['scraper', 'alerte', 'auto-generated', 'batch-dealers']
            });

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dealers-report-${{ github.run_id }}
          path: reports/dealers/
          retention-days: 30
