name: AutoRadar Rareté — boucle référentiel (mensuel)

# Entretien auto de la boucle rareté, 100% en base (aucun site externe -> pas
# de blocage IP). Enchaine dans l'ordre :
#   1. enrich_cars_from_ref --resume   : lie les nouvelles annonces au référentiel
#                                        (pose ref_model_id sur les non-liées).
#   2. enrich_production_from_listings : annonces "1/N" -> production_total du réf
#                                        (guardé : >=2 annonces, anti-châssis).
#   3. enrich_rarity_from_ref          : réf connu-rare -> feat_score/feat_chips
#                                        (colonnes parallèles, jamais sc/ch).
# "On y touche plus" : tourne le 1er de chaque mois.

on:
  schedule:
    - cron: '0 3 1 * *'          # 1er du mois, 03h UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (aucune écriture)'
        required: false
        default: 'false'

concurrency:
  group: rarity-refresh
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SENTRY_DSN_SCRAPER: ${{ secrets.SENTRY_DSN_SCRAPER }}
      SENTRY_ENVIRONMENT: 'production'
      SENTRY_COMPONENT: 'cron-rarity'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 1/ Lier les nouvelles annonces au référentiel
        continue-on-error: true
        run: python -u enrich_cars_from_ref.py --resume

      - name: 2/ Annonces -> production_total du référentiel
        continue-on-error: true
        run: |
          python -u enrich_production_from_listings.py \
            ${{ github.event.inputs.dry_run == 'true' && '' || '--write' }}

      - name: 3/ Référentiel rare -> feat_score
        continue-on-error: true
        run: |
          python -u enrich_rarity_from_ref.py \
            ${{ github.event.inputs.dry_run == 'true' && '' || '--write' }}
