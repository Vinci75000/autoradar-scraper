name: AutoRadar Elferspot (cron 06h UTC — recentes)

# elferspot.com — marketplace Porsche (~4100 fiches).
# NOTE : elferspot est protege par BunnyShield qui renvoie 403 sur les IP
# datacenter de GitHub Actions -> le cron planifie NE MARCHE PAS ici. Le
# rafraichissement des recentes tourne en cron LOCAL (run_elferspot_cron.sh,
# IP residentielle). Ce workflow reste en dispatch manuel uniquement (au cas ou
# les IP evoluent / pour test).

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Pages de /rechercher/ a paginer (4 = ~160 recentes)'
        required: false
        default: '4'
      limit:
        description: 'Fiches max a traiter'
        required: false
        default: '150'

concurrency:
  group: elferspot-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_SCRAPER }}
      SENTRY_COMPONENT: elferspot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run elferspot (recentes)
        run: |
          python -u run_generic.py --slug elferspot \
            --max-pages ${{ github.event.inputs.max_pages || '4' }} \
            --limit ${{ github.event.inputs.limit || '150' }} \
            --write
