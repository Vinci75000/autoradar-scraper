name: AutoRadar GENERIC dealers (cron 01h30 UTC)

# Les ~270 dealers generiques (httpx) ne tiennent pas en un seul job sous les
# 70 min GitHub -> il etait Cancelled et n'en scrapait qu'une partie. On shard
# en 4 tranches PARALLELES (crc32(slug) % 4) : chaque job ~68 dealers, ~40 min,
# tout le monde est couvert chaque nuit.

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Fiches max par dealer'
        required: false
        default: '25'
      delay:
        description: 'Delai entre dealers (s)'
        required: false
        default: '1.2'

concurrency:
  group: batch-generic
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GENERIC dealers (shard ${{ matrix.shard }}/4)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENTRY_DSN_SCRAPER: ${{ secrets.SENTRY_DSN_SCRAPER }}
          SENTRY_ENVIRONMENT: 'production'
          SENTRY_COMPONENT: 'cron-generic'
          AUTORADAR_LLM_HOOK_ENABLED: "false"
        run: |
          python3 run_generic.py \
            --shard ${{ matrix.shard }}/4 \
            --limit ${{ github.event.inputs.limit || '25' }} \
            --write \
            --delay ${{ github.event.inputs.delay || '1.2' }} \
            --threshold 50
        continue-on-error: true
