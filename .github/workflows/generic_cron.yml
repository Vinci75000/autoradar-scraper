name: AutoRadar GENERIC dealers (cron 01h30 UTC)

on:
  schedule:
    # 01:30 UTC = 02:30 Paris hiver / 03:30 Paris ete
    # Apres dealers (00h) et avant wash (03h) — pas de chevauchement.
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Fiches max par dealer'
        required: false
        default: '25'
      delay:
        description: 'Delai entre dealers (s)'
        required: false
        default: '1.5'
      threshold:
        description: "Seuil d'alerte en % (alert si sources_ok_pct <)"
        required: false
        default: '50'

concurrency:
  group: batch-generic
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GENERIC dealers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENTRY_DSN_SCRAPER: ${{ secrets.SENTRY_DSN_SCRAPER }}
          SENTRY_ENVIRONMENT: 'production'
          SENTRY_COMPONENT: 'cron-generic'
          AUTORADAR_LLM_HOOK_ENABLED: "true"
        run: |
          python3 run_generic.py \
            --limit ${{ github.event.inputs.limit || '25' }} \
            --write \
            --delay ${{ github.event.inputs.delay || '1.5' }} \
            --threshold ${{ github.event.inputs.threshold || '50' }}
        continue-on-error: true

      - name: Read summary JSON
        id: summary
        if: always()
        run: |
          if [ -f reports/generic/latest.json ]; then
            ALERT=$(python3 -c "import json; print(json.load(open('reports/generic/latest.json'))['alert'])")
            OK_PCT=$(python3 -c "import json; print(json.load(open('reports/generic/latest.json'))['sources_ok_pct'])")
            OK_COUNT=$(python3 -c "import json; print(json.load(open('reports/generic/latest.json'))['sources_ok'])")
            TOTAL=$(python3 -c "import json; print(json.load(open('reports/generic/latest.json'))['sources_total'])")
            NEW_CARS=$(python3 -c "import json; print(json.load(open('reports/generic/latest.json'))['new_in_db'])")

            echo "alert=$ALERT" >> $GITHUB_OUTPUT
            echo "ok_pct=$OK_PCT" >> $GITHUB_OUTPUT
            echo "ok_count=$OK_COUNT" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "new_cars=$NEW_CARS" >> $GITHUB_OUTPUT
          fi

      - name: Analyze and rotate reports
        if: always()
        continue-on-error: true
        run: python3 analyzer.py --batch generic

      - name: Commit report to repo
        if: always()
        run: |
          git config user.name "AutoRadar Bot"
          git config user.email "bot@autoradar.local"
          git add reports/generic/ || true
          if git diff --cached --quiet; then
            echo "Aucun changement a commiter"
          else
            git commit -m "🏎️ generic run @ $(date -u +%Y-%m-%d_%H:%M_UTC) — ${{ steps.summary.outputs.ok_count }}/${{ steps.summary.outputs.total }} OK, ${{ steps.summary.outputs.new_cars }} new"
            git pull --rebase origin main || true
            git push
          fi

      - name: Open alert issue if <threshold
        if: steps.summary.outputs.alert == 'True'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportContent = fs.readFileSync('reports/generic/latest.md', 'utf8');
            const okPct = '${{ steps.summary.outputs.ok_pct }}';
            const okCount = '${{ steps.summary.outputs.ok_count }}';
            const total = '${{ steps.summary.outputs.total }}';
            const newCars = '${{ steps.summary.outputs.new_cars }}';
            const today = new Date().toISOString().slice(0,10);

            const title = `⚠️ Batch GENERIC degrade — ${okCount}/${total} OK (${okPct}%) — ${today}`;
            const body = `**Alerte automatique :** moins du seuil des dealers generic sont operationnels.\n\n` +
                         `- **OK :** ${okCount}/${total} (${okPct}%)\n` +
                         `- **Nouvelles voitures :** ${newCars}\n` +
                         `- **Run :** ${new Date().toISOString()}\n\n` +
                         `<details><summary>Rapport complet</summary>\n\n${reportContent}\n</details>\n\n` +
                         `_Issue auto-creee par cron GENERIC._`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['scraper', 'alerte', 'auto-generated', 'batch-generic']
            });

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generic-report-${{ github.run_id }}
          path: reports/generic/
          retention-days: 30
