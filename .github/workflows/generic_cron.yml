name: AutoRadar GENERIC dealers (cron 01h30 UTC)

on:
  schedule:
    # 01:30 UTC = 02:30 Paris hiver / 03:30 Paris ete
    # Apres dealers (00h) et avant wash (03h) — pas de chevauchement.
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Fiches max par dealer'
        required: false
        default: '25'
      delay:
        description: 'Delai entre dealers (s)'
        required: false
        default: '1.5'

# Evite les runs concurrents
concurrency:
  group: batch-generic
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GENERIC dealers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # LLM hook : actif si run_generic partage le pipeline d'insertion
          # qui respecte AUTORADAR_LLM_HOOK_ENABLED. Sans effet sinon.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENTRY_DSN_SCRAPER: ${{ secrets.SENTRY_DSN_SCRAPER }}
          SENTRY_ENVIRONMENT: 'production'
          SENTRY_COMPONENT: 'cron-generic'
          AUTORADAR_LLM_HOOK_ENABLED: "true"
        run: |
          python3 run_generic.py \
            --limit ${{ github.event.inputs.limit || '25' }} \
            --write \
            --delay ${{ github.event.inputs.delay || '1.5' }}
