name: AutoRadar Batch GREEN (cron 22h UTC)

on:
  schedule:
    # 22:00 UTC = 23:00 Paris hiver / 00:00 Paris été
    # 1x/jour pour économiser les minutes GitHub Actions
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: 'Pages par source'
        required: false
        default: '3'
      threshold:
        description: "Seuil d'alerte en %"
        required: false
        default: '50'

concurrency:
  group: batch-green
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run batch GREEN
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 batch_runner.py \
            --batch green \
            --quiet \
            --pages ${{ github.event.inputs.pages || '3' }} \
            --threshold ${{ github.event.inputs.threshold || '50' }}
        continue-on-error: true

      - name: Read summary JSON
        id: summary
        if: always()
        run: |
          if [ -f reports/green/latest.json ]; then
            ALERT=$(python3 -c "import json; print(json.load(open('reports/green/latest.json'))['alert'])")
            OK_PCT=$(python3 -c "import json; print(json.load(open('reports/green/latest.json'))['sources_ok_pct'])")
            OK_COUNT=$(python3 -c "import json; print(json.load(open('reports/green/latest.json'))['sources_ok'])")
            TOTAL=$(python3 -c "import json; print(json.load(open('reports/green/latest.json'))['sources_total'])")
            NEW_CARS=$(python3 -c "import json; print(json.load(open('reports/green/latest.json'))['new_in_db'])")

            echo "alert=$ALERT" >> $GITHUB_OUTPUT
            echo "ok_pct=$OK_PCT" >> $GITHUB_OUTPUT
            echo "ok_count=$OK_COUNT" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "new_cars=$NEW_CARS" >> $GITHUB_OUTPUT
          fi

      - name: Commit report to repo
        if: always()
        run: |
          git config user.name "AutoRadar Bot"
          git config user.email "bot@autoradar.local"
          git add reports/green/
          if git diff --cached --quiet; then
            echo "Aucun changement à commiter"
          else
            git commit -m "🌿 green run @ $(date -u +%Y-%m-%d_%H:%M_UTC) — ${{ steps.summary.outputs.ok_count }}/${{ steps.summary.outputs.total }} OK, ${{ steps.summary.outputs.new_cars }} new"
            git pull --rebase origin main || true
            git push
          fi

      - name: Open alert issue if <threshold
        if: steps.summary.outputs.alert == 'True'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportContent = fs.readFileSync('reports/green/latest.md', 'utf8');
            const okPct = '${{ steps.summary.outputs.ok_pct }}';
            const okCount = '${{ steps.summary.outputs.ok_count }}';
            const total = '${{ steps.summary.outputs.total }}';
            const newCars = '${{ steps.summary.outputs.new_cars }}';
            const today = new Date().toISOString().slice(0,10);

            const title = `⚠️ Batch GREEN dégradé — ${okCount}/${total} OK (${okPct}%) — ${today}`;
            const body = `**Alerte automatique :** moins de 50% des sources GREEN sont opérationnelles.\n\n` +
                         `Cause probable : Cloudflare a renforcé son blocage, ou un site a changé d'URL/structure.\n\n` +
                         `- **OK :** ${okCount}/${total} (${okPct}%)\n` +
                         `- **Nouvelles voitures :** ${newCars}\n` +
                         `- **Run :** ${new Date().toISOString()}\n\n` +
                         `<details><summary>Rapport complet</summary>\n\n${reportContent}\n</details>\n\n` +
                         `_Issue auto-créée par cron GREEN._`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['scraper', 'alerte', 'auto-generated', 'batch-green']
            });

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: green-report-${{ github.run_id }}
          path: reports/green/
          retention-days: 30
