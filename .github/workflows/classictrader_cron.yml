name: AutoRadar CarAndClassic Pipeline (cron 09h UTC)

# classictrader.com — sitemap-mode crawl (~8400 cars).
# Sharde N=6 : 6 jobs paralleles (crc32 de l'URL), ~1400 fiches/shard,
# ~23 min/shard << timeout 60 min. Couvre TOUT le stock chaque nuit.

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max URLs par shard (vide = shard complet)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (no DB write)'
        required: false
        default: 'false'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    concurrency:
      group: classictrader-shard-${{ matrix.shard }}
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_SCRAPER }}
      SENTRY_COMPONENT: classictrader
      AUTORADAR_LLM_HOOK_ENABLED: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run classictrader pipeline (shard ${{ matrix.shard }}/6)
        run: |
          python -u scripts/run_classictrader.py \
            --shard ${{ matrix.shard }}/6 \
            ${{ github.event.inputs.limit && format('--limit {0}', github.event.inputs.limit) || '' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
