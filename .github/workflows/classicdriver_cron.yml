name: AutoRadar CarAndClassic Pipeline (cron 07h UTC)

# classicdriver.com canary — sitemap-mode crawl (~18.8k cars worldwide).
# Schedule modeste (1x/jour 07h UTC) pour les 1-2 premieres semaines.
# Apres validation, on consolidera dans marketplace_cron (avec dyler
# et A4.2 classicdriver).

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max URLs to process (empty = full run)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (no DB write)'
        required: false
        default: 'false'

concurrency:
  group: classicdriver-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_SCRAPER }}
      SENTRY_COMPONENT: classicdriver
      AUTORADAR_LLM_HOOK_ENABLED: 'true'
      LIMIT: ${{ github.event.inputs.limit }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run classicdriver pipeline
        run: python -u scripts/run_classicdriver.py --limit 3000
