name: wash_cron

on:
  schedule:
    - cron: '0 3 * * *'  # Daily 03h UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (pas de writes Supabase)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      batch_size:
        description: 'Nombre max de cars par run'
        required: false
        default: '500'
      max_age_days:
        description: 'Cars non vues depuis X jours'
        required: false
        default: '7'

jobs:
  wash:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests "supabase>=2.0" python-dotenv

      - name: Run wash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '500' }}
          MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '7' }}
        run: python -u clean_expired.py
